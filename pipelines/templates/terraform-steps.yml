# ---------------------------------------------------------------------------
# Reusable template: Terraform Init → Plan → Publish Artifact
# Mirrors the existing pattern from rg-iac/azure-pipelines-script.yml.
# ---------------------------------------------------------------------------
parameters:
  - name: workingDirectory
    type: string
  - name: environment
    type: string
  - name: backendKey
    type: string
  - name: terraformVersion
    type: string
    default: '1.14.8'

steps:
  - checkout: self

  - template: install-terraform.yml
    parameters:
      terraformVersion: ${{ parameters.terraformVersion }}

  - template: init-terraform.yml
    parameters:
      workingDirectory: ${{ parameters.workingDirectory }}
      backendKey: ${{ parameters.backendKey }}

  - task: AzureCLI@2
    displayName: 'Terraform Plan (${{ parameters.environment }})'
    inputs:
      azureSubscription: 'TF-SPN-ADO'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        terraform plan \
          -var-file=environments/${{ parameters.environment }}.tfvars \
          -out=tfplan
      workingDirectory: ${{ parameters.workingDirectory }}
    env:
      ARM_CLIENT_ID: $(ARM_CLIENT_ID)
      ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
      ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
      ARM_TENANT_ID: $(ARM_TENANT_ID)

  - task: PublishPipelineArtifact@1
    displayName: 'Publish TF Plan'
    inputs:
      artifactName: 'tfplan-${{ parameters.environment }}'
      targetPath: '${{ parameters.workingDirectory }}/tfplan'
      publishLocation: 'pipeline'
